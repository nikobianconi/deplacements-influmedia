<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Déplacements Clients — Influmedia</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #116776;
    --teal-light: #1a8fa3;
    --teal-dark: #0a4a56;
    --coral: #FF5F5F;
    --coral-dark: #e04848;
    --cream: #F4F2ED;
    --dark: #0d1f24;
    --dark2: #152d35;
    --mid: #1e3d48;
    --text-muted: #7a9aa3;
    --confirmed: #2ecc71;
    --pending: #f39c12;
    --planned: #3498db;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(17,103,118,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 10% 80%, rgba(255,95,95,0.08) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo-area { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 44px; height: 44px;
    background: var(--teal);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: white;
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.5px;
    line-height: 1;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 2px;
  }

  .btn-add {
    background: var(--coral);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px 22px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }

  .btn-add:hover { background: var(--coral-dark); transform: translateY(-1px); }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 20px;
    flex: 1;
    min-width: 130px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 30px;
    line-height: 1;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-card.s-total .stat-num { color: var(--teal-light); }
  .stat-card.s-ok .stat-num { color: var(--confirmed); }
  .stat-card.s-pending .stat-num { color: var(--pending); }
  .stat-card.s-planned .stat-num { color: var(--planned); }

  /* YEAR SECTION */
  .year-section { margin-bottom: 40px; }

  .year-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 10px;
    margin-bottom: 20px;
  }

  /* MONTH ROW */
  .month-block { margin-bottom: 28px; }

  .month-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .month-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 19px;
    color: var(--cream);
    min-width: 70px;
  }

  .month-count {
    font-size: 12px;
    background: rgba(255,255,255,0.07);
    color: var(--text-muted);
    border-radius: 20px;
    padding: 2px 10px;
    font-weight: 500;
  }

  .client-avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .client-avatar.status-confirmé { background: rgba(46,204,113,0.15); color: var(--confirmed); border: 1px solid rgba(46,204,113,0.25); }
  .client-avatar.status-attente { background: rgba(243,156,18,0.15); color: var(--pending); border: 1px solid rgba(243,156,18,0.25); }
  .client-avatar.status-planifié { background: rgba(52,152,219,0.15); color: var(--planned); border: 1px solid rgba(52,152,219,0.25); }

  /* TRIP CARDS */
  .trips-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .trip-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .trip-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 12px 0 0 12px;
  }

  .trip-card.status-confirmé::before { background: var(--confirmed); }
  .trip-card.status-attente::before { background: var(--pending); }
  .trip-card.status-planifié::before { background: var(--planned); }

  .trip-card:hover {
    border-color: rgba(17,103,118,0.4);
    transform: translateX(2px);
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.status-confirmé { background: var(--confirmed); box-shadow: 0 0 6px rgba(46,204,113,0.5); }
  .status-dot.status-attente { background: var(--pending); box-shadow: 0 0 6px rgba(243,156,18,0.5); }
  .status-dot.status-planifié { background: var(--planned); box-shadow: 0 0 6px rgba(52,152,219,0.5); }

  .trip-info { flex: 1; min-width: 0; }

  .trip-client {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .trip-meta {
    display: flex;
    gap: 14px;
    margin-top: 3px;
    flex-wrap: wrap;
  }

  .trip-meta span {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge.status-confirmé { background: rgba(46,204,113,0.15); color: var(--confirmed); border: 1px solid rgba(46,204,113,0.3); }
  .badge.status-attente { background: rgba(243,156,18,0.15); color: var(--pending); border: 1px solid rgba(243,156,18,0.3); }
  .badge.status-planifié { background: rgba(52,152,219,0.15); color: var(--planned); border: 1px solid rgba(52,152,219,0.3); }

  .trip-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: background 0.2s;
  }

  .btn-edit {
    background: rgba(255,255,255,0.07);
    color: var(--cream);
  }
  .btn-edit:hover { background: rgba(255,255,255,0.15); }

  .btn-cycle {
    background: rgba(17,103,118,0.2);
    color: var(--teal-light);
  }
  .btn-cycle:hover { background: rgba(17,103,118,0.4); }

  .btn-del {
    background: rgba(255,95,95,0.1);
    color: var(--coral);
  }
  .btn-del:hover { background: rgba(255,95,95,0.25); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,31,36,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--dark2);
    border: 1px solid rgba(17,103,118,0.3);
    border-radius: 18px;
    width: 100%;
    max-width: 460px;
    padding: 28px;
    animation: popIn 0.25s ease;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 22px;
    color: var(--cream);
  }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--dark);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--teal);
  }

  .form-group select option { background: var(--dark); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: rgba(255,255,255,0.07);
    color: var(--text-muted);
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-cancel:hover { background: rgba(255,255,255,0.12); }

  .btn-save {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-save:hover { background: var(--teal-light); }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--mid);
    border: 1px solid rgba(17,103,118,0.4);
    color: var(--cream);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 500;
    z-index: 200;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: rgba(17,103,118,0.2);
    border-color: var(--teal);
    color: var(--teal-light);
  }

  .filter-btn.active.f-ok { background: rgba(46,204,113,0.15); border-color: var(--confirmed); color: var(--confirmed); }
  .filter-btn.active.f-wait { background: rgba(243,156,18,0.15); border-color: var(--pending); color: var(--pending); }
  .filter-btn.active.f-plan { background: rgba(52,152,219,0.15); border-color: var(--planned); color: var(--planned); }
</style>
</head>
<body>

<div class="wrapper">
  <!-- HEADER -->
  <header>
    <div class="logo-area">
      <div class="logo-icon">IN</div>
      <div>
        <div class="header-title">Déplacements Clients</div>
        <div class="header-sub">Influmedia — Suivi des missions terrain</div>
      </div>
    </div>
    <button class="btn-add" onclick="openModal()">
      ＋ Ajouter un déplacement
    </button>
  </header>

  <!-- STATS -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Tous</button>
    <button class="filter-btn f-ok" data-filter="confirmé" onclick="setFilter('confirmé', this)">✓ Confirmés</button>
    <button class="filter-btn f-wait" data-filter="attente" onclick="setFilter('attente', this)">⏳ En attente</button>
    <button class="filter-btn f-plan" data-filter="planifié" onclick="setFilter('planifié', this)">📅 À planifier</button>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2 id="modalTitle">🗺️ Nouveau déplacement</h2>
    <div class="form-group">
      <label>Client</label>
      <input type="text" id="f_client" placeholder="Ex: Ouiglass Montauban" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Mois</label>
        <select id="f_month">
          <option value="Janvier">Janvier</option>
          <option value="Février">Février</option>
          <option value="Mars">Mars</option>
          <option value="Avril" selected>Avril</option>
          <option value="Mai">Mai</option>
          <option value="Juin">Juin</option>
          <option value="Juillet">Juillet</option>
          <option value="Août">Août</option>
          <option value="Septembre">Septembre</option>
          <option value="Octobre">Octobre</option>
          <option value="Novembre">Novembre</option>
          <option value="Décembre">Décembre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Année</label>
        <select id="f_year">
          <option value="2026" selected>2026</option>
          <option value="2027">2027</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Dates / Période</label>
      <input type="text" id="f_dates" placeholder="Ex: 21-23 avril" />
    </div>
    <div class="form-group">
      <label>Ville</label>
      <input type="text" id="f_city" placeholder="Ex: Montauban" />
    </div>
    <div class="form-group">
      <label>Statut</label>
      <select id="f_status">
        <option value="confirmé">✓ Confirmé</option>
        <option value="attente">⏳ En attente</option>
        <option value="planifié">📅 À planifier</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes (optionnel)</label>
      <input type="text" id="f_notes" placeholder="Ex: Confirmer les horaires" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveTrip()"><span id="saveBtnLabel">Enregistrer</span></button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const MONTH_ORDER = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let trips = JSON.parse(localStorage.getItem('influmedia_trips') || 'null') || [
  { id: 1, client: 'Ouiglass Montauban', month: 'Avril', year: '2026', dates: '21-23 avril', city: 'Montauban', status: 'confirmé', notes: '' },
  { id: 2, client: 'Ouiglass Ambérieu', month: 'Avril', year: '2026', dates: '24-25 avril', city: 'Ambérieu', status: 'confirmé', notes: '' },
  { id: 3, client: 'Maty', month: 'Avril', year: '2026', dates: '28 avril', city: '', status: 'planifié', notes: '' },
  { id: 4, client: 'Ouiglass Andrézieux-Bouthéon', month: 'Avril', year: '2026', dates: 'Avril en prévision', city: 'Andrézieux-Bouthéon', status: 'attente', notes: '' },
  { id: 5, client: 'Ouiglass Le Mans', month: 'Avril', year: '2026', dates: 'À définir', city: 'Le Mans', status: 'attente', notes: '' },
  { id: 6, client: 'Lorenove Pacy-Évreux', month: 'Mai', year: '2026', dates: '5-6 mai', city: 'Pacy-Évreux', status: 'confirmé', notes: '' },
  { id: 7, client: 'Glass4Lux', month: 'Mai', year: '2026', dates: '8 mai', city: '', status: 'planifié', notes: '' },
  { id: 8, client: 'Ouiglass Montpellier', month: 'Mai', year: '2026', dates: '20-21 mai', city: 'Montpellier', status: 'confirmé', notes: '' },
  { id: 9, client: 'Ouiglass Anglet', month: 'Juin', year: '2026', dates: '1 et 2 juin', city: 'Anglet', status: 'planifié', notes: '' },
  { id: 10, client: 'Ouiglass / Garage RCG Le Beausset', month: 'Juillet', year: '2026', dates: '13-15 juillet OU 29 juin-1 juil.', city: 'Le Beausset', status: 'attente', notes: 'Dates à confirmer' },
  { id: 11, client: 'Ouiglass Pacy-sur-Eure', month: 'Août', year: '2026', dates: 'Août', city: 'Pacy-sur-Eure', status: 'planifié', notes: '' },
  { id: 12, client: 'Ouiglass Réunion', month: 'Janvier', year: '2027', dates: '8-17 janvier', city: 'La Réunion', status: 'planifié', notes: '11-20 déc. meilleure météo' },
];

let nextId = Math.max(...trips.map(t => t.id)) + 1;
let activeFilter = 'all';
let editingId = null;

function save() {
  localStorage.setItem('influmedia_trips', JSON.stringify(trips));
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function cycleStatus(id) {
  const order = ['confirmé', 'attente', 'planifié'];
  const t = trips.find(t => t.id === id);
  const idx = order.indexOf(t.status);
  t.status = order[(idx + 1) % order.length];
  save();
  render();
  toast('Statut mis à jour → ' + t.status);
}

function deleteTrip(id) {
  trips = trips.filter(t => t.id !== id);
  save();
  render();
  toast('Déplacement supprimé');
}

function editTrip(id) {
  const t = trips.find(t => t.id === id);
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ Modifier le déplacement';
  document.getElementById('saveBtnLabel').textContent = 'Mettre à jour';
  document.getElementById('f_client').value = t.client;
  document.getElementById('f_month').value = t.month;
  document.getElementById('f_year').value = t.year;
  document.getElementById('f_dates').value = t.dates;
  document.getElementById('f_city').value = t.city;
  document.getElementById('f_status').value = t.status;
  document.getElementById('f_notes').value = t.notes;
  document.getElementById('modalOverlay').classList.add('open');
}

function render() {
  // Stats
  const visible = activeFilter === 'all' ? trips : trips.filter(t => t.status === activeFilter);
  const total = trips.length;
  const ok = trips.filter(t => t.status === 'confirmé').length;
  const pend = trips.filter(t => t.status === 'attente').length;
  const plan = trips.filter(t => t.status === 'planifié').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card s-total"><div class="stat-num">${total}</div><div class="stat-label">Total déplacements</div></div>
    <div class="stat-card s-ok"><div class="stat-num">${ok}</div><div class="stat-label">Confirmés</div></div>
    <div class="stat-card s-pending"><div class="stat-num">${pend}</div><div class="stat-label">En attente</div></div>
    <div class="stat-card s-planned"><div class="stat-num">${plan}</div><div class="stat-label">À planifier</div></div>
  `;

  // Group by client name
  const filtered = activeFilter === 'all' ? trips : trips.filter(t => t.status === activeFilter);
  const grouped = {};
  filtered.forEach(t => {
    // Extract base client name (ex: "Ouiglass Montauban" -> "Ouiglass")
    const base = t.client;
    if (!grouped[base]) grouped[base] = [];
    grouped[base].push(t);
  });

  // Sort clients by their earliest trip date (chronological)
  const clients = Object.keys(grouped).sort((a, b) => {
    const earliest = (trips) => {
      const sorted = [...trips].sort((x, y) => x.year !== y.year ? x.year - y.year : MONTH_ORDER.indexOf(x.month) - MONTH_ORDER.indexOf(y.month));
      return parseInt(sorted[0].year) * 100 + MONTH_ORDER.indexOf(sorted[0].month);
    };
    return earliest(grouped[a]) - earliest(grouped[b]);
  });
  let html = '';

  if (filtered.length === 0) {
    html = '<div class="empty">Aucun déplacement trouvé.</div>';
  }

  clients.forEach(client => {
    const ctrips = grouped[client];
    // Sort trips within client by year then month
    ctrips.sort((a, b) => a.year !== b.year ? a.year - b.year : MONTH_ORDER.indexOf(a.month) - MONTH_ORDER.indexOf(b.month));
    // Determine overall status: if any confirmed → confirmed, else if any attente → attente, else planifié
    const hasConfirmed = ctrips.some(t => t.status === 'confirmé');
    const hasAttente = ctrips.some(t => t.status === 'attente');
    const clientStatus = hasConfirmed ? 'confirmé' : hasAttente ? 'attente' : 'planifié';
    // Initials for avatar
    const initials = client.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();

    html += `<div class="month-block">
      <div class="month-header">
        <div class="client-avatar status-${clientStatus}">${initials}</div>
        <div class="month-name">${client}</div>
        <div class="month-count">${ctrips.length} mission${ctrips.length > 1 ? 's' : ''}</div>
      </div>
      <div class="trips-grid">`;

    ctrips.forEach(t => {
      html += `
        <div class="trip-card status-${t.status}">
          <div class="status-dot status-${t.status}"></div>
          <div class="trip-info">
            <div class="trip-client">${t.month} ${t.year}</div>
            <div class="trip-meta">
              ${t.dates ? `<span>📅 ${t.dates}</span>` : ''}
              ${t.city ? `<span>📍 ${t.city}</span>` : ''}
              ${t.notes ? `<span>💬 ${t.notes}</span>` : ''}
            </div>
          </div>
          <div class="badge status-${t.status}">${statusLabel(t.status)}</div>
          <div class="trip-actions">
            <button class="btn-icon btn-edit" onclick="editTrip(${t.id})" title="Modifier">✏️</button>
            <button class="btn-icon btn-cycle" onclick="cycleStatus(${t.id})" title="Changer le statut">↻</button>
            <button class="btn-icon btn-del" onclick="deleteTrip(${t.id})" title="Supprimer">✕</button>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function statusLabel(s) {
  return s === 'confirmé' ? '✓ Confirmé' : s === 'attente' ? '⏳ En attente' : '📅 À planifier';
}

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '🗺️ Nouveau déplacement';
  document.getElementById('saveBtnLabel').textContent = 'Enregistrer';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  editingId = null;
  document.getElementById('modalOverlay').classList.remove('open');
  ['f_client','f_dates','f_city','f_notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_status').value = 'confirmé';
  document.getElementById('f_month').value = 'Avril';
  document.getElementById('f_year').value = '2026';
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveTrip() {
  const client = document.getElementById('f_client').value.trim();
  if (!client) { alert('Merci d\'entrer le nom du client.'); return; }

  if (editingId !== null) {
    // Mode édition
    const t = trips.find(t => t.id === editingId);
    t.client = client;
    t.month = document.getElementById('f_month').value;
    t.year = document.getElementById('f_year').value;
    t.dates = document.getElementById('f_dates').value.trim();
    t.city = document.getElementById('f_city').value.trim();
    t.status = document.getElementById('f_status').value;
    t.notes = document.getElementById('f_notes').value.trim();
    save();
    closeModal();
    render();
    toast('Déplacement mis à jour ✓');
  } else {
    // Mode ajout
    const trip = {
      id: nextId++,
      client,
      month: document.getElementById('f_month').value,
      year: document.getElementById('f_year').value,
      dates: document.getElementById('f_dates').value.trim(),
      city: document.getElementById('f_city').value.trim(),
      status: document.getElementById('f_status').value,
      notes: document.getElementById('f_notes').value.trim(),
    };
    trips.push(trip);
    save();
    closeModal();
    render();
    toast('Déplacement ajouté ✓');
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

render();
</script>
</body>
</html>
